<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timesheet</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="manifest" href="assets/site.webmanifest">
<meta name="theme-color" content="#2f6fed">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
/* ── Fonts ──────────────────────────────────────────────────────────────── */
@font-face {
  font-family: "Schibsted Grotesk"; font-style: normal; font-weight: 400 800;
  font-display: swap;
  src: local("Schibsted Grotesk"),
       url("https://fonts.bunny.net/schibsted-grotesk/files/schibsted-grotesk-latin-400-normal.woff2") format("woff2");
}
@font-face {
  font-family: "JetBrains Mono"; font-style: normal; font-weight: 400 600;
  font-display: swap;
  src: local("JetBrains Mono"),
       url("https://fonts.bunny.net/jetbrains-mono/files/jetbrains-mono-latin-500-normal.woff2") format("woff2");
}

/* ── Design tokens (light) ──────────────────────────────────────────────── */
:root {
  --font-sans: "Schibsted Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --font-scale: 1;
  --fs-base:  calc(15px * var(--font-scale));
  --fs-input: calc(15px * var(--font-scale));
  --fs-label: calc(12px * var(--font-scale));
  --fs-title: calc(13px * var(--font-scale));
  --fs-small: calc(12.5px * var(--font-scale));
  --fs-h1:    calc(22px * var(--font-scale));

  --accent:        #2f6fed;
  --accent-hover:  #1f57cf;
  --accent-soft:   #eef3fe;
  --accent-border: #c7d9fb;
  --on-accent:     #ffffff;

  --bg:           #f4f6f9;
  --surface:      #ffffff;
  --surface-2:    #f8f9fb;
  --surface-3:    #f1f3f6;
  --border:       #e3e7ee;
  --border-strong:#d3d9e2;
  --text:         #14181e;
  --text-soft:    #3a434f;
  --text-muted:   #5f6975;
  --placeholder:  #9aa3af;

  --danger:  #d64545; --danger-soft:  #fbeaea; --danger-border:  #f0c9c9;
  --warning: #c9851f; --warning-soft: #fbf1dd; --warning-border: #eed9ad;
  --success: #1f9d5f; --success-soft: #e2f3ea; --success-border: #bfe3cf;
  --info:    #2f6fed; --info-soft:    #eef3fe; --info-border:    #c7d9fb;

  --radius:    8px;
  --radius-sm: 6px;
  --radius-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(20,24,30,.05);
  --shadow:    0 6px 22px rgba(20,24,30,.08);
  --ring:      0 0 0 3px rgba(47,111,237,.20);
  color-scheme: light;
}

/* ── Dark mode ──────────────────────────────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --accent:#5685e9; --accent-hover:#6c98ef; --accent-soft:#16233f; --accent-border:#21386a; --on-accent:#ffffff;
    --bg:#0d1117; --surface:#161b22; --surface-2:#1c232c; --surface-3:#1c232c;
    --border:#232a33; --border-strong:#2d3641;
    --text:#eef1f5; --text-soft:#c2cad3; --text-muted:#8b95a1; --placeholder:#6f7986;
    --danger:#e06464; --danger-soft:#341819; --danger-border:#5a2a2a;
    --warning:#d99a3a; --warning-soft:#33270f; --warning-border:#574017;
    --success:#3bb97a; --success-soft:#13301f; --success-border:#1f4d33;
    --info:#88abf2; --info-soft:#16233f; --info-border:#21386a;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 8px 28px rgba(0,0,0,.5);
    --ring:0 0 0 3px rgba(86,133,233,.32);
    color-scheme: dark;
  }
}
:root[data-theme="dark"] {
  --accent:#5685e9; --accent-hover:#6c98ef; --accent-soft:#16233f; --accent-border:#21386a; --on-accent:#ffffff;
  --bg:#0d1117; --surface:#161b22; --surface-2:#1c232c; --surface-3:#1c232c;
  --border:#232a33; --border-strong:#2d3641;
  --text:#eef1f5; --text-soft:#c2cad3; --text-muted:#8b95a1; --placeholder:#6f7986;
  --danger:#e06464; --danger-soft:#341819; --danger-border:#5a2a2a;
  --warning:#d99a3a; --warning-soft:#33270f; --warning-border:#574017;
  --success:#3bb97a; --success-soft:#13301f; --success-border:#1f4d33;
  --info:#88abf2; --info-soft:#16233f; --info-border:#21386a;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 8px 28px rgba(0,0,0,.5);
  --ring:0 0 0 3px rgba(86,133,233,.32);
  color-scheme: dark;
}

/* ── Base ───────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: 1.55;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.006em;
}
.kb-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ── Page shell ─────────────────────────────────────────────────────────── */
.kb-wrap { max-width: 980px; margin: 0 auto; padding: 24px 20px 56px; }

/* ── Toolbar ────────────────────────────────────────────────────────────── */
.kb-toolbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.kb-toolbar .spacer { flex: 1; }
.kb-seg {
  display: inline-flex; align-items: center; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 3px;
}
.kb-seg button {
  font: 600 var(--fs-small)/1 var(--font-sans);
  color: var(--text-muted); background: transparent; border: 0;
  white-space: nowrap; padding: 5px 10px; border-radius: 4px; cursor: pointer;
}
.kb-seg button.is-active { background: var(--accent-soft); color: var(--accent); }
.kb-seg button:hover:not(.is-active) { color: var(--text); }
.kb-iconbtn {
  display: inline-grid; place-items: center; width: 32px; height: 32px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer;
}
.kb-iconbtn:hover { color: var(--accent); border-color: var(--accent-border); }

/* ── Document header ────────────────────────────────────────────────────── */
.kb-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px; padding-bottom: 20px; margin-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.kb-brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
.kb-brand .logo {
  height: 46px; width: 46px; flex: 0 0 46px; border-radius: 10px;
  display: grid; place-items: center; overflow: hidden;
}
.kb-brand .logo img { width: 100%; height: 100%; object-fit: contain; }
.kb-brand .org { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
.kb-brand .org small { display: block; font-size: var(--fs-small); font-weight: 500; color: var(--text-muted); letter-spacing: 0; }
.kb-doctitle { text-align: right; }
.kb-doctitle h1 { margin: 0; font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.01em; color: var(--text); display: inline-flex; align-items: center; gap: 9px; }
.kb-doctitle h1 svg { flex-shrink: 0; }
.kb-doctitle .meta { margin-top: 4px; font-size: var(--fs-small); color: var(--text-muted); font-family: var(--font-mono); }
/* language dropdown in toolbar */
.kb-toolbar .kb-select { width: auto; padding: 5px 28px 5px 8px; font-size: var(--fs-small); font-weight: 600; color: var(--text-muted); }
.kb-toolbar .kb-select:hover { color: var(--text); }
/* zoom % label next to size buttons */
.kb-sz-label { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

/* ── Cards ──────────────────────────────────────────────────────────────── */
.kb-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 20px 22px;
  margin-bottom: 14px;
}
.kb-card__title {
  display: flex; align-items: center; gap: 9px;
  font-size: var(--fs-title); font-weight: 700; letter-spacing: -0.005em;
  color: var(--text-soft); margin: 0 0 16px;
}
.kb-card__title::before {
  content: ""; width: 3px; height: 14px; border-radius: 2px; background: var(--accent);
}

/* ── Grid / fields ──────────────────────────────────────────────────────── */
.kb-grid { display: grid; gap: 12px 16px; }
.kb-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.kb-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.kb-grid.cols-5 { grid-template-columns: 1.6fr 1fr 1fr 1fr 1fr; }
.kb-field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.kb-label {
  font-size: var(--fs-label); font-weight: 600; letter-spacing: 0.03em;
  text-transform: uppercase; color: var(--text-muted);
}
.kb-input, .kb-select, .kb-textarea {
  width: 100%; font: 400 var(--fs-input)/1.4 var(--font-sans);
  color: var(--text); background: var(--surface);
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  padding: 8px 11px; outline: none; transition: border-color .14s, box-shadow .14s;
}
.kb-input::placeholder, .kb-textarea::placeholder { color: var(--placeholder); }
.kb-input:focus, .kb-select:focus, .kb-textarea:focus {
  border-color: var(--accent); box-shadow: var(--ring);
}
.kb-input:disabled, .kb-select:disabled, .kb-input[readonly] {
  background: var(--surface-3); color: var(--text-muted); cursor: not-allowed;
}
.kb-input.num { font-family: var(--font-mono); text-align: right; font-variant-numeric: tabular-nums; }
.kb-select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16' fill='none' stroke='%235F6975' stroke-width='1.6'><path d='M4 6l4 4 4-4'/></svg>");
  background-repeat: no-repeat; background-position: right 10px center; padding-right: 32px;
}
.kb-input.is-error, .kb-select.is-error { border-color: var(--danger); }
.kb-input.is-warn { border-color: var(--warning); background: var(--warning-soft); }

/* ── Buttons ────────────────────────────────────────────────────────────── */
.kb-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  white-space: nowrap;
  font: 600 var(--fs-input)/1 var(--font-sans);
  padding: 10px 16px; border-radius: var(--radius-sm);
  border: 1px solid transparent; cursor: pointer; transition: background .14s, border-color .14s, color .14s;
}
.kb-btn svg { width: 16px; height: 16px; }
.kb-btn--primary { background: var(--accent); color: var(--on-accent); }
.kb-btn--primary:hover { background: var(--accent-hover); }
.kb-btn--primary:disabled { opacity: .5; cursor: not-allowed; }
.kb-btn--ghost { background: var(--surface); color: var(--text-soft); border-color: var(--border-strong); }
.kb-btn--ghost:hover { border-color: var(--accent); color: var(--accent); }
.kb-btn--soft { background: var(--accent-soft); color: var(--accent); }
.kb-btn--soft:hover { background: var(--accent); color: var(--on-accent); }
.kb-btn--dashed { background: transparent; color: var(--accent); border: 1px dashed var(--accent-border); }
.kb-btn--dashed:hover { background: var(--accent-soft); border-color: var(--accent); }
.kb-btn--lg { padding: 12px 24px; font-size: calc(15px * var(--font-scale)); }
.kb-circbtn {
  width: 24px; height: 24px; border-radius: 50%; display: inline-grid; place-items: center;
  font-size: 15px; line-height: 1; font-weight: 700; cursor: pointer; padding: 0;
  background: var(--surface); border: 1px solid var(--accent); color: var(--accent);
}
.kb-circbtn:hover { background: var(--accent); color: var(--on-accent); }
.kb-circbtn--rm { border-color: var(--danger); color: var(--danger); }
.kb-circbtn--rm:hover { background: var(--danger); color: #fff; }

/* ── Notes / validation banners ─────────────────────────────────────────── */
.kb-note {
  border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 14px;
  font-size: var(--fs-small); line-height: 1.7;
  display: flex; gap: 10px; align-items: flex-start;
}
.kb-note svg { width: 17px; height: 17px; flex: 0 0 17px; margin-top: 1px; }
.kb-note--error   { background: var(--danger-soft);  border: 1px solid var(--danger-border);  color: var(--danger); }
.kb-note--warning { background: var(--warning-soft); border: 1px solid var(--warning-border); color: var(--warning); }
.kb-note--success { background: var(--success-soft); border: 1px solid var(--success-border); color: var(--success); }
.kb-note--info    { background: var(--info-soft);    border: 1px solid var(--info-border);    color: var(--info); }
.kb-note b { font-weight: 700; }
.kb-note ul { padding-left: 18px; margin-top: 4px; }
.kb-note li { margin: 1px 0; }

/* ── Row grid (timesheet entries) ───────────────────────────────────────── */
.kb-rowhead, .ts-row2 {
  display: grid;
  align-items: center;
  gap: 6px;
  grid-template-columns: 108px 112px 112px 108px 1fr 64px 52px;
}
.kb-rowhead {
  padding: 0 10px 8px;
  font-size: var(--fs-label); font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted);
}
.kb-rowhead .r { text-align: right; }
.ts-row2 {
  padding: 6px 10px; border-radius: var(--radius-sm);
  border-left: 3px solid transparent;
  position: relative;
}
.ts-row2:hover { background: var(--surface-2); }
.ts-row2.continuation .ts-date { visibility: hidden; }
.ts-row2 input[type="time"] { font-family: var(--font-mono); padding-right: 4px; }
.ts-date { font-weight: 600; font-size: var(--fs-small); color: var(--text); white-space: nowrap; }
.ts-date .dow { display: block; font-weight: 500; font-size: 11px; color: var(--text-muted); }
.ts-hours { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: var(--fs-small); font-weight: 600; color: var(--text); white-space: nowrap; }
.ts-actions { display: flex; align-items: center; justify-content: flex-end; gap: 3px; opacity: 0; transition: opacity .15s; }
.ts-row2:hover .ts-actions { opacity: 1; }
.ts-unlock {
  display: none; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-muted); cursor: pointer; white-space: nowrap;
  position: absolute; right: 0; top: 0; bottom: 0; padding: 0 8px;
  background: inherit; border-radius: var(--radius-sm);
}
.ts-row2:hover .ts-unlock { display: flex; }
.ts-unlock input[type="checkbox"] { width: 13px; height: 13px; margin: 0; cursor: pointer; }

/* Inline day validation */
.ts-day-val {
  font-size: 11px; padding: 4px 10px 4px 13px; line-height: 1.6;
  color: var(--danger);
}
.ts-day-val .warn { color: var(--warning); }

/* Code chip legend */
.ts-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.kb-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: var(--fs-small); font-weight: 600; line-height: 1.3;
  white-space: nowrap;
  background: var(--chip-bg, var(--surface-3));
  border: 1px solid var(--chip-border, var(--border-strong));
  color: var(--chip-text, var(--text-soft));
}
.kb-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--chip-border, var(--text-muted)); flex-shrink: 0; }

/* ── Totals panel ───────────────────────────────────────────────────────── */
.kb-totals { margin-left: auto; width: min(420px, 100%); }
.kb-totals--fill { margin-left: 0; width: 100%; }
.kb-totals .row { display: flex; justify-content: space-between; gap: 16px; padding: 5px 0; font-size: var(--fs-base); }
.kb-totals .row .lab { color: var(--text-muted); }
.kb-totals .row .val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text); }
.kb-totals .grand {
  margin-top: 8px; padding-top: 12px; border-top: 1px solid var(--border-strong);
  display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
}
.kb-totals .grand .lab { font-weight: 700; color: var(--text); }
.kb-totals .grand .val { font-family: var(--font-mono); font-weight: 700; font-size: calc(20px * var(--font-scale)); color: var(--accent); font-variant-numeric: tabular-nums; }
.kb-totals .note { margin-top: 12px; font-size: var(--fs-small); color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 10px; line-height: 1.6; }

/* ── Signature ──────────────────────────────────────────────────────────── */
.kb-sig { border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); height: 100px; display: block; max-width: 100%; touch-action: none; cursor: crosshair; }
.sig-controls { display: flex; gap: 8px; margin-top: 8px; }

/* ── Action row ─────────────────────────────────────────────────────────── */
.kb-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
.kb-actions .spacer { flex: 1; }
/* Bottom action bar: Save 20% | Validate 20% | Download 60% */
.kb-actbar { display: flex; gap: 10px; margin-top: 8px; }
.kb-actbar .kb-btn { flex: 2; }
.kb-actbar .kb-btn--primary { flex: 6; }

/* ── Modal ──────────────────────────────────────────────────────────────── */
.kb-overlay {
  position: fixed; inset: 0; background: rgba(20,24,30,.35); z-index: 9999;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.kb-modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 24px 28px; max-width: 420px; width: 100%;
}
.kb-modal__hdr {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  font-size: var(--fs-title); font-weight: 700; color: var(--text);
}
.kb-modal__body {
  font-size: var(--fs-small); line-height: 1.7; color: var(--text-soft); margin-bottom: 20px;
}
.kb-modal__body p { margin-bottom: 10px; }
.kb-modal__body p:last-child { margin-bottom: 0; }
.kb-modal__body strong { font-weight: 700; color: var(--text); }
.kb-modal__body a { color: var(--accent); }
.kb-modal__footer { display: flex; justify-content: flex-end; gap: 8px; }

/* ── Footer ─────────────────────────────────────────────────────────────── */
.kb-footer {
  max-width: 980px; margin: 0 auto; padding: 16px 20px 8px;
  font-size: var(--fs-small); color: var(--text-muted);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.kb-footer a { color: var(--text-muted); text-decoration: none; }
.kb-footer a:hover { color: var(--accent); text-decoration: underline; }
.kb-footer button { color: var(--text-muted); }
.kb-footer button:hover { color: var(--accent); text-decoration: underline; }
.kb-footer .sep { opacity: .45; }
.kb-mark { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; color: var(--text-soft); }

/* ── Loading / error ────────────────────────────────────────────────────── */
.kb-loading { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: var(--fs-base); }
.kb-error { color: var(--danger); }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .kb-grid.cols-3, .kb-grid.cols-5 { grid-template-columns: 1fr 1fr; }
  .kb-grid.cols-2 { grid-template-columns: 1fr; }
  .kb-header { flex-direction: column; gap: 14px; }
  .kb-doctitle { text-align: left; }
  .kb-rowhead { display: none; }
  .ts-row2 {
    grid-template-columns: 1fr 1fr;
    gap: 8px; padding: 12px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    border-left-width: 4px;
    margin-bottom: 8px;
  }
  .ts-row2.continuation .ts-date { display: none; }
}
@media print {
  .kb-toolbar, .kb-actions, .sig-controls, .kb-footer { display: none !important; }
}
</style>
</head>
<body>
<div id="app"><p class="kb-loading">Loading configuration…</p></div>

<footer class="kb-footer">
  <span class="kb-mark">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <rect x="1" y="5" width="11" height="11" rx="3" fill="var(--accent)"/>
      <rect x="6" y="1" width="11" height="11" rx="3" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
    </svg>
    kBenestad
  </span>
  <span class="sep">·</span>
  <span>© 2026 Kristian Benestad</span>
  <span class="sep">·</span>
  <a href="https://github.com/kbenestad/timesheet" target="_blank" rel="noopener">kbenestad/timesheet</a>
  <span class="sep">·</span>
  <button id="footer-about-btn" style="background:none;border:none;padding:0;font:inherit;font-size:var(--fs-small);color:var(--text-muted);cursor:pointer;">About</button>
</footer>

<script>
(async function() {
'use strict';

// ========== UTILITIES ==========
const $ = (sel, ctx) => (ctx || document).querySelector(sel);
const $$ = (sel, ctx) => [...(ctx || document).querySelectorAll(sel)];
const el = (tag, attrs, children) => {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v != null && v !== false) e.setAttribute(k, v);
  });
  if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
};

function defaultPeriod() {
  const d = new Date();
  const isLastDay = d.getDate() === new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  const y = isLastDay ? d.getFullYear() : (d.getMonth() === 0 ? d.getFullYear() - 1 : d.getFullYear());
  const m = isLastDay ? d.getMonth() : (d.getMonth() === 0 ? 11 : d.getMonth() - 1);
  const fmt = dt => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  return { from: fmt(new Date(y, m, 1)), to: fmt(new Date(y, m + 1, 0)) };
}

function fmtHM(totalMins) {
  if (totalMins == null || isNaN(totalMins) || totalMins < 0) return '';
  const h = Math.floor(totalMins / 60);
  const m = Math.abs(totalMins % 60);
  return `${h}:${String(m).padStart(2,'0')}`;
}

function parseHM(str) {
  if (!str) return null;
  const [h, m] = str.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h * 60 + m;
}

function calcRowMins(row) {
  const inM = parseHM(row.timeIn);
  const outM = parseHM(row.timeOut);
  if (inM == null || outM == null || outM <= inM) return null;
  return outM - inM;
}

const DOW_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_NAMES_VI = ['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12'];

function getMonthNames(lang) {
  return lang === 'vi' ? MONTH_NAMES_VI : MONTH_NAMES_EN;
}

function parseDateStr(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function dateStrDow(s) {
  return parseDateStr(s).getDay();
}

function fmtDate(s, lang) {
  const d = parseDateStr(s);
  const mn = getMonthNames(lang)[d.getMonth()];
  return `${d.getDate()} ${mn}`;
}

function fmtDow(s, lang) {
  const dow = DOW_NAMES[parseDateStr(s).getDay()];
  if (lang !== 'vi') return dow;
  const map = {Sun:'CN',Mon:'T2',Tue:'T3',Wed:'T4',Thu:'T5',Fri:'T6',Sat:'T7'};
  return map[dow] || dow;
}

function dateRange(from, to) {
  const dates = [];
  const d = parseDateStr(from);
  const end = parseDateStr(to);
  while (d <= end) {
    const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    dates.push(s);
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

// ========== CONFIG ==========
let CFG;
async function loadConfig() {
  const res = await fetch('config.yml');
  if (!res.ok) throw new Error('Cannot load config.yml');
  CFG = jsyaml.load(await res.text());
  document.documentElement.style.setProperty('--accent', CFG['accent-colour'] || '#2f6fed');
}

function S(key) {
  const ui = CFG['ui-strings'] || {};
  const entry = ui[key];
  if (!entry) return key;
  return entry[state.lang] || entry['en'] || key;
}

function codeObj(code) {
  return (CFG.codes || []).find(c => c.code === code);
}

function codesForType(empType) {
  return (CFG.codes || []).filter(c => (c['employee-types'] || []).includes(empType));
}

function isHoliday(dateStr) {
  return (CFG.holidays || []).some(h => h.date === dateStr);
}

function holidayObj(dateStr) {
  return (CFG.holidays || []).find(h => h.date === dateStr);
}

function isWorkday(dateStr) {
  const dow = DOW_NAMES[dateStrDow(dateStr)];
  return (CFG['workdays'] || ['Mon','Tue','Wed','Thu','Fri']).includes(dow);
}

// ========== STATE ==========
const state = {
  employee: '',
  empType: '',
  lang: 'en',
  periodFrom: '',
  periodTo: '',
  days: {},
  unlocks: {},
};

function rowKey(dateStr, idx) { return `${dateStr}-${idx}`; }

// ========== ROW DEFAULTS ==========
function empTypeObj(code) {
  return (CFG['employee-types'] || []).find(t => t.code === code) || null;
}

function workStart() { return CFG['workhours-from'] || '09:00'; }
function workEnd()   { return CFG['workhours-to']   || '17:00'; }

function defaultRowsForDay(dateStr, empType) {
  const wstart = workStart();
  const wend   = workEnd();
  const weekend = !isWorkday(dateStr);
  const holiday = isHoliday(dateStr);
  const defCode = CFG['default-work-code'] || 'REG';

  const tObj = empTypeObj(empType);
  const prefilled = tObj ? tObj.prefilled : 'working';

  if (weekend) {
    return [{ code: 'WEEKEND', timeIn: '', timeOut: '', desc: '', _locked: true }];
  }
  if (holiday) {
    const hObj = holidayObj(dateStr);
    const hName = hObj ? (hObj[`display-${state.lang}`] || hObj['display-en'] || '') : '';
    if (prefilled === 'non-working') {
      return [{ code: 'NON', timeIn: '', timeOut: '', desc: hName, _locked: true }];
    }
    return [{ code: 'HOL', timeIn: wstart, timeOut: wend, desc: hName, _locked: true }];
  }
  if (prefilled === 'non-working') {
    return [{ code: 'NON', timeIn: '', timeOut: '', desc: '', _locked: true }];
  }
  return [{ code: defCode, timeIn: wstart, timeOut: wend, desc: '', _locked: false }];
}

function buildDefaultDays(from, to, empType) {
  const days = {};
  for (const ds of dateRange(from, to)) {
    days[ds] = defaultRowsForDay(ds, empType);
  }
  return days;
}

function isRowLocked(dateStr, idx, row) {
  if (state.unlocks[rowKey(dateStr, idx)]) return false;
  return row._locked === true;
}

// ========== PERSISTENCE ==========
let autoSaveTimer = null;

function saveState() {
  const serial = {
    employee: state.employee, empType: state.empType, lang: state.lang,
    periodFrom: state.periodFrom, periodTo: state.periodTo,
    days: state.days, unlocks: state.unlocks,
  };
  try { localStorage.setItem('ts-state', JSON.stringify(serial)); } catch(e) {}
}

function loadSavedState() {
  const raw = localStorage.getItem('ts-state');
  if (!raw) return false;
  try {
    const d = JSON.parse(raw);
    if (d.employee != null) state.employee = d.employee;
    if (d.empType)   state.empType = d.empType;
    if (d.lang)      state.lang    = d.lang;
    if (d.periodFrom) state.periodFrom = d.periodFrom;
    if (d.periodTo)   state.periodTo   = d.periodTo;
    if (d.days)   state.days    = d.days;
    if (d.unlocks) state.unlocks = d.unlocks;
    return true;
  } catch(e) { return false; }
}

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveState, 1000);
}

// ========== TOTALS ==========
function computeTotals() {
  const empType = state.empType;
  const codeTotals = {};
  let grandMins = 0;

  for (const [ds, rows] of Object.entries(state.days)) {
    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const code = row.code;
      if (!code || code === 'WEEKEND') continue;
      const cObj = codeObj(code);
      if (!cObj || !cObj.counthours) continue;
      if (code === 'HOL' && !codesForType(empType).find(c => c.code === 'HOL')) continue;
      const mins = calcRowMins(row);
      if (mins == null || mins <= 0) continue;
      codeTotals[code] = (codeTotals[code] || 0) + mins;
      grandMins += mins;
    }
  }
  return { codeTotals, grandMins };
}

function showConfirmModal(msgHTML) {
  return new Promise(resolve => {
    const overlay = el('div', {className:'kb-overlay'});
    const modal = el('div', {className:'kb-modal'});
    const hdr = el('div', {className:'kb-modal__hdr'});
    // warning icon
    const warnSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    warnSvg.setAttribute('width','20'); warnSvg.setAttribute('height','20');
    warnSvg.setAttribute('viewBox','0 0 24 24'); warnSvg.setAttribute('fill','none');
    warnSvg.setAttribute('stroke','var(--warning)'); warnSvg.setAttribute('stroke-width','2');
    warnSvg.setAttribute('stroke-linecap','round'); warnSvg.setAttribute('stroke-linejoin','round');
    const warnPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    warnPath.setAttribute('d','M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01');
    warnSvg.appendChild(warnPath);
    hdr.append(warnSvg, el('span', null, state.lang === 'vi' ? 'Xác nhận' : 'Confirm'));
    const body = el('div', {className:'kb-modal__body'});
    body.innerHTML = msgHTML;
    const footer = el('div', {className:'kb-modal__footer'});
    const cancelBtn = el('button', {className:'kb-btn kb-btn--ghost'}, state.lang === 'vi' ? 'Huỷ' : 'Cancel');
    const confirmBtn = el('button', {className:'kb-btn kb-btn--primary'}, S('btn-new'));
    cancelBtn.addEventListener('click', () => { overlay.remove(); resolve(false); });
    confirmBtn.addEventListener('click', () => { overlay.remove(); resolve(true); });
    footer.append(cancelBtn, confirmBtn);
    modal.append(hdr, body, footer);

function showAboutModal() {
  const overlay = el('div', {className:'kb-overlay'});
  const modal = el('div', {className:'kb-modal'});
  const hdr = el('div', {className:'kb-modal__hdr'});
  hdr.append(el('span', null, CFG['about-title'] || 'About'));
  const body = el('div', {className:'kb-modal__body'});
  body.innerHTML = markdownToHTML(CFG['about-content'] || '');
  const footer = el('div', {className:'kb-modal__footer'});
  const closeBtn = el('button', {className:'kb-btn kb-btn--primary'}, CFG['about-button'] || 'Close');
  closeBtn.addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  footer.append(closeBtn);
  modal.append(hdr, body, footer);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  closeBtn.focus();
}

function markdownToHTML(md) {
  if (!md) return '';
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .split(/\n\n+/)
    .map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`)
    .join('');
}

// ========== VALIDATION ==========
function runValidation() {
  const errors = [];
  const warnings = [];

  const wstartM = parseHM(workStart());
  const wendM   = parseHM(workEnd());
  const stdMins = (wendM != null && wstartM != null) ? (wendM - wstartM) : null;

  const sortedDates = Object.keys(state.days).sort();

  for (const ds of sortedDates) {
    const rows = state.days[ds];
    const displayDate = fmtDate(ds, state.lang);
    let dayTotalMins = 0;
    const intervals = [];

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const locked = isRowLocked(ds, i, row);
      if (locked) continue;
      if (!row.code || row.code === 'WEEKEND') continue;

      const inM  = parseHM(row.timeIn);
      const outM = parseHM(row.timeOut);
      if (inM != null && outM != null && outM <= inM) {
        errors.push(`${displayDate}: ${S('val-time-order')}`);
      } else if (inM != null && outM != null && outM > inM) {
        intervals.push([inM, outM]);
        dayTotalMins += (outM - inM);
      }

      if ((row.code === 'REG' || row.code === 'OTH') && !row.desc.trim()) {
        errors.push(`${displayDate}: ${S('val-desc-required')} (${row.code})`);
      }
    }

    const sorted = [...intervals].sort((a,b) => a[0]-b[0]);
    for (let i = 1; i < sorted.length; i++) {
      if (sorted[i][0] < sorted[i-1][1]) {
        errors.push(`${displayDate}: ${S('val-time-overlap')}`);
        break;
      }
    }

    if (stdMins != null && dayTotalMins > stdMins) {
      warnings.push(`${displayDate}: ${S('val-hours-exceed')} (${fmtHM(dayTotalMins)} > ${fmtHM(stdMins)})`);
    }

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const locked = isRowLocked(ds, i, row);
      if (locked) continue;
      if (!row.code) {
        warnings.push(`${displayDate}: ${S('val-code-empty')}`);
        break;
      }
    }
  }

  const byDate = {};
  [...errors, ...warnings].forEach(msg => {
    for (const ds of sortedDates) {
      if (msg.startsWith(fmtDate(ds, state.lang) + ':')) {
        if (!byDate[ds]) byDate[ds] = { errors: [], warnings: [] };
        if (errors.includes(msg)) byDate[ds].errors.push(msg.slice(fmtDate(ds, state.lang).length + 1).trim());
        else byDate[ds].warnings.push(msg.slice(fmtDate(ds, state.lang).length + 1).trim());
        break;
      }
    }
  });
  return { errors, warnings, byDate };
}

// ========== ROW COLOUR ==========
function applyRowColour(rowEl, dateStr, row, rowIndex, totalRowsForDay) {
  const code = row.code;
  const mutedbg = CFG['muted-background'] === true || CFG['muted-background'] === 'yes';

  rowEl.style.borderLeftColor = '';
  rowEl.style.background = '';

  if (!code || code === 'WEEKEND') {
    rowEl.style.borderLeftColor = 'var(--border-strong)';
    if (mutedbg) rowEl.style.background = 'var(--surface-3)';
    return;
  }

  const cObj = codeObj(code);
  if (!cObj) return;

  let borderCol, bgCol;

  if (code === 'PPT') {
    const isFullDay = totalRowsForDay === 1;
    borderCol = isFullDay ? cObj['colour-border-fullday'] : cObj['colour-border-partialday'];
    bgCol     = isFullDay ? cObj['colour-bg-fullday']     : cObj['colour-bg-partialday'];
  } else {
    borderCol = cObj['colour-border'];
    bgCol     = cObj['colour-bg'];
  }

  if (borderCol) rowEl.style.borderLeftColor = borderCol;
  if (bgCol && mutedbg) rowEl.style.background = bgCol;
}

// ========== SIGNATURE ==========
let signatureDataUrl = null;

function loadSignature() {
  signatureDataUrl = localStorage.getItem('ts-signature') || null;
}

function saveSignature(dataUrl) {
  signatureDataUrl = dataUrl || null;
  if (dataUrl) localStorage.setItem('ts-signature', dataUrl);
  else localStorage.removeItem('ts-signature');
}

function needsSignature() {
  return CFG.needssignature === true || CFG.needssignature === 'yes';
}

function renderSignatureArea(wrap) {
  if (!needsSignature()) return;

  const card = el('div', {className: 'kb-card'});
  const title = el('h2', {className: 'kb-card__title'}, S('signature-employee'));
  card.appendChild(title);

  const grid = el('div', {className: 'kb-grid cols-1', style: {gap: '18px', maxWidth: '50%'}});

  function makeSigField(labelKey) {
    const field = el('div', {className: 'kb-field'});
    field.appendChild(el('span', {className: 'kb-label'}, S(labelKey)));

    const canvas = el('canvas', {width: 500, height: 100, className: 'kb-sig'});
    const ctx = canvas.getContext('2d');

    if (labelKey === 'signature-employee' && signatureDataUrl) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = signatureDataUrl;
    }

    if (labelKey === 'signature-employee') {
      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
        const src = e.touches ? e.touches[0] : e;
        return [(src.clientX - rect.left) * sx, (src.clientY - rect.top) * sy];
      }

      let drawing = false, lx = 0, ly = 0;

      function startDraw(e) { drawing = true; [lx, ly] = getPos(e); }
      function moveDraw(e) {
        if (!drawing) return;
        const [x, y] = getPos(e);
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(x, y);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#14181e';
        ctx.lineWidth = 1.8; ctx.lineCap = 'round'; ctx.stroke();
        [lx, ly] = [x, y];
        saveSignature(canvas.toDataURL('image/png'));
      }
      function stopDraw() { drawing = false; }

      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', moveDraw);
      canvas.addEventListener('mouseup', stopDraw);
      canvas.addEventListener('mouseleave', stopDraw);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, {passive:false});
      canvas.addEventListener('touchmove',  e => { e.preventDefault(); moveDraw(e);  }, {passive:false});
      canvas.addEventListener('touchend', stopDraw);

      const controls = el('div', {className: 'sig-controls'});
      const clearBtn = el('button', {type:'button', className:'kb-btn kb-btn--ghost'}, 'Clear');
      clearBtn.style.cssText = 'font-size:12px;padding:4px 12px';
      clearBtn.addEventListener('click', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        saveSignature(null);
      });

      const fileInput = el('input', {type:'file', accept:'image/*', style:{display:'none'}});
      const uploadBtn = el('button', {type:'button', className:'kb-btn kb-btn--ghost'}, 'Upload image');
      uploadBtn.style.cssText = 'font-size:12px;padding:4px 12px';
      uploadBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height, 1);
            const dw = img.width * scale, dh = img.height * scale;
            ctx.drawImage(img, (canvas.width - dw) / 2, (canvas.height - dh) / 2, dw, dh);
            saveSignature(canvas.toDataURL('image/png'));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });

      controls.append(clearBtn, uploadBtn, fileInput);
      field.append(canvas, controls);
    } else {
      canvas.style.cursor = 'default';
      field.appendChild(canvas);
    }

    return field;
  }

  grid.append(makeSigField('signature-employee'));
  card.appendChild(grid);
  wrap.appendChild(card);
}

// ========== RENDER ==========
let validationResult = null;

function buildChipStyle(tag, attrs, cObj, code, totalRowsForDay) {
  let border, bg, text;
  if (code === 'PPT' && cObj) {
    const full = totalRowsForDay === 1;
    border = full ? cObj['colour-border-fullday'] : cObj['colour-border-partialday'];
    bg     = full ? cObj['colour-bg-fullday']     : cObj['colour-bg-partialday'];
  } else if (cObj) {
    border = cObj['colour-border'];
    bg     = cObj['colour-bg'];
  }
  const chipEl = el(tag, attrs);
  if (border) chipEl.style.setProperty('--chip-border', border);
  if (bg)     chipEl.style.setProperty('--chip-bg', bg);
  // derive text as the border colour (darkened is fine; bg is pale)
  if (border) chipEl.style.setProperty('--chip-text', border);
  return chipEl;
}

function updateGenBtn(btn) {
  btn.disabled = !!(validationResult && validationResult.errors.length > 0);
}

function renderValBox(box) {
  box.innerHTML = '';
  if (!validationResult) return;
  const {errors, warnings} = validationResult;
  if (!errors.length && !warnings.length) return;

  if (errors.length) {
    const note = el('div', {className:'kb-note kb-note--error'});
    const icon = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>`;
    const inner = el('div');
    inner.innerHTML = `<b>${state.lang === 'vi' ? 'Lỗi — cần sửa trước khi tạo:' : 'Errors — fix before generating:'}</b><ul>${errors.map(e=>`<li>${e}</li>`).join('')}</ul>`;
    note.innerHTML = icon;
    note.appendChild(inner);
    box.appendChild(note);
  }
  if (warnings.length) {
    const note = el('div', {className:'kb-note kb-note--warning'});
    const icon = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg>`;
    const inner = el('div');
    inner.innerHTML = `<b>${state.lang === 'vi' ? 'Cảnh báo:' : 'Warnings:'}</b><ul>${warnings.map(w=>`<li>${w}</li>`).join('')}</ul>`;
    note.innerHTML = icon;
    note.appendChild(inner);
    box.appendChild(note);
  }
}

function renderDayBlock(dateStr) {
  const block = el('div', {className:'day-block', id:`day-${dateStr}`});
  redrawDayBlock(block, dateStr);
  return block;
}

function redrawDayBlock(block, dateStr) {
  block.innerHTML = '';
  const rows = state.days[dateStr] || [];
  const totalRows = rows.length;
  rows.forEach((row, i) => {
    block.appendChild(renderRow(dateStr, i, row, i === 0, i === totalRows - 1, totalRows));
  });
  renderDayValMessages(block, dateStr);
}

function renderDayValMessages(block, dateStr) {
  const old = block.querySelector('.ts-day-val');
  if (old) old.remove();
  if (!validationResult || !validationResult.byDate[dateStr]) return;
  const { errors, warnings } = validationResult.byDate[dateStr];
  if (!errors.length && !warnings.length) return;
  const div = el('div', {className:'ts-day-val'});
  errors.forEach(msg => { const d = el('div'); d.textContent = '⚠ ' + msg; div.appendChild(d); });
  warnings.forEach(msg => { const d = el('div', {className:'warn'}); d.textContent = '⚠ ' + msg; div.appendChild(d); });
  block.appendChild(div);
}

function renderRow(dateStr, rowIndex, row, isFirst, isLast, totalRows) {
  const locked = isRowLocked(dateStr, rowIndex, row);
  const timeLocked = locked && totalRows === 1;
  const rowEl = el('div', {className: 'ts-row2' + (isFirst ? '' : ' continuation')});

  // Date cell
  const dateCellEl = el('div', {className:'ts-date'});
  if (isFirst) {
    dateCellEl.appendChild(document.createTextNode(fmtDate(dateStr, state.lang)));
    const dowSpan = el('span', {className:'dow'}, fmtDow(dateStr, state.lang));
    dateCellEl.appendChild(dowSpan);
  }
  rowEl.appendChild(dateCellEl);

  // Time In
  const timeInEl = el('input', {type:'time', className:'kb-input', value: row.timeIn || '', ...(timeLocked ? {disabled:''} : {})});
  timeInEl.addEventListener('change', () => {
    row.timeIn = timeInEl.value;
    updateHoursCell(rowEl, row);
    refreshSummary();
    scheduleAutoSave();
  });
  rowEl.appendChild(timeInEl);

  // Time Out
  const timeOutEl = el('input', {type:'time', className:'kb-input', value: row.timeOut || '', ...(timeLocked ? {disabled:''} : {})});
  timeOutEl.addEventListener('change', () => {
    row.timeOut = timeOutEl.value;
    updateHoursCell(rowEl, row);
    refreshSummary();
    scheduleAutoSave();
  });
  rowEl.appendChild(timeOutEl);

  // Code dropdown
  const codeEl = el('select', {className:'kb-select', ...(locked ? {disabled:''} : {})});
  if (!locked) {
    const available = codesForType(state.empType);
    if (!row.code) codeEl.appendChild(el('option', {value:''}, ''));
    if (row._locked && !isWorkday(dateStr)) {
      codeEl.appendChild(el('option', {value:'__WEEKEND__'}, state.lang === 'vi' ? 'Cuối tuần' : 'Weekend'));
    }
    available.forEach(c => {
      const dispKey = `display-${state.lang}`;
      const disp = c[dispKey] || c['display-en'] || c.code;
      codeEl.appendChild(el('option', {value: c.code, ...(row.code === c.code ? {selected:''} : {})}, disp));
    });
    codeEl.addEventListener('change', () => {
      const newCode = codeEl.value;
      const revert = newCode === '__WEEKEND__';
      const newCObj = codeObj(newCode);
      const becomesLocked = revert || (newCObj && newCObj.lockstate === 'locked');
      row.code = revert ? 'WEEKEND' : newCode;
      if (becomesLocked) {
        if (revert || !newCObj || !newCObj.counthours) { row.timeIn = ''; row.timeOut = ''; }
        else { row.timeIn = workStart(); row.timeOut = workEnd(); }
        row.desc = '';
        row._locked = true;
        delete state.unlocks[rowKey(dateStr, rowIndex)];
        const block = $(`#day-${dateStr}`);
        if (block) redrawDayBlock(block, dateStr);
      } else {
        if (newCObj && newCObj.counthours) {
          if (!row.timeIn)  { row.timeIn  = workStart(); timeInEl.value  = row.timeIn; }
          if (!row.timeOut) { row.timeOut = workEnd();   timeOutEl.value = row.timeOut; }
          updateHoursCell(rowEl, row);
        }
        applyRowColour(rowEl, dateStr, row, rowIndex, totalRows);
        updateDescHint(descEl, row);
      }
      scheduleAutoSave();
      refreshSummary();
    });
  } else {
    const cObj = codeObj(row.code);
    if (row.code === 'WEEKEND') {
      codeEl.appendChild(el('option', {value:'WEEKEND'}, state.lang === 'vi' ? 'Cuối tuần' : 'Weekend'));
    } else if (cObj) {
      const dispKey = `display-${state.lang}`;
      codeEl.appendChild(el('option', {value: row.code}, cObj[dispKey] || cObj['display-en'] || row.code));
    } else {
      codeEl.appendChild(el('option', {value: row.code || ''}, row.code || ''));
    }
  }
  rowEl.appendChild(codeEl);

  // Description
  const descEl = el('input', {type:'text', className:'kb-input', value: row.desc || '', ...(locked ? {disabled:''} : {})});
  updateDescHint(descEl, row);
  descEl.addEventListener('input', () => { row.desc = descEl.value; scheduleAutoSave(); });
  rowEl.appendChild(descEl);

  // Hours
  const hoursEl = el('div', {className:'ts-hours kb-mono', id:`hrs-${dateStr}-${rowIndex}`});
  const mins = calcRowMins(row);
  hoursEl.textContent = (mins != null && mins > 0) ? fmtHM(mins) : '';
  rowEl.appendChild(hoursEl);

  // Action buttons
  const actionEl = el('div', {className:'ts-actions'});
  if (isLast && !isFirst) {
    const rmBtn = el('button', {type:'button', className:'kb-circbtn kb-circbtn--rm', title:'Remove row'}, '−');
    rmBtn.addEventListener('click', () => {
      state.days[dateStr].splice(rowIndex, 1);
      const block = $(`#day-${dateStr}`);
      if (block) redrawDayBlock(block, dateStr);
      refreshSummary(); scheduleAutoSave();
    });
    actionEl.appendChild(rmBtn);
  }
  if (isLast) {
    const addBtn = el('button', {type:'button', className:'kb-circbtn', title:'Add row'}, '+');
    addBtn.addEventListener('click', () => {
      state.days[dateStr].push({ code: '', timeIn: '', timeOut: '', desc: '', _locked: false });
      const block = $(`#day-${dateStr}`);
      if (block) redrawDayBlock(block, dateStr);
      refreshSummary(); scheduleAutoSave();
    });
    actionEl.appendChild(addBtn);
  } else if (!isFirst) {
    const rmBtn = el('button', {type:'button', className:'kb-circbtn kb-circbtn--rm', title:'Remove row'}, '−');
    rmBtn.addEventListener('click', () => {
      state.days[dateStr].splice(rowIndex, 1);
      const block = $(`#day-${dateStr}`);
      if (block) redrawDayBlock(block, dateStr);
      refreshSummary(); scheduleAutoSave();
    });
    actionEl.appendChild(rmBtn);
  }
  rowEl.appendChild(actionEl);

  // Unlock checkbox
  if (row._locked && !state.unlocks[rowKey(dateStr, rowIndex)]) {
    const unlockWrap = el('label', {className:'ts-unlock', title: S('unlock-label')});
    const chk = el('input', {type:'checkbox'});
    chk.addEventListener('change', () => {
      if (chk.checked) {
        state.unlocks[rowKey(dateStr, rowIndex)] = true;
        row.code   = CFG['default-work-code'] || 'REG';
        row.timeIn  = workStart();
        row.timeOut = workEnd();
      } else {
        delete state.unlocks[rowKey(dateStr, rowIndex)];
      }
      const block = $(`#day-${dateStr}`);
      if (block) redrawDayBlock(block, dateStr);
      scheduleAutoSave();
    });
    unlockWrap.append(chk, S('unlock-label'));
    rowEl.appendChild(unlockWrap);
  }

  applyRowColour(rowEl, dateStr, row, rowIndex, totalRows);
  return rowEl;
}

function updateDescHint(descEl, row) {
  const cObj = codeObj(row.code);
  descEl.placeholder = cObj ? (cObj[`hint-${state.lang}`] || cObj['hint-en'] || '') : '';
}

function updateHoursCell(rowEl, row) {
  const mins = calcRowMins(row);
  const hEl = rowEl.querySelector('.ts-hours');
  if (hEl) hEl.textContent = (mins != null && mins > 0) ? fmtHM(mins) : '';
}

function refreshSummary() {
  const existing = $('#summary-card');
  if (existing) existing.replaceWith(renderSummary());
}

function renderSummary() {
  const {codeTotals, grandMins} = computeTotals();
  const card = el('div', {className:'kb-card', id:'summary-card'});
  card.appendChild(el('h2', {className:'kb-card__title'}, state.lang === 'vi' ? 'Tổng kết' : 'Summary'));

  const totals = el('div', {className:'kb-totals kb-totals--fill'});

  const decimalHours = (grandMins / 60).toFixed(2);

  const shownCodes = (CFG.codes || []).filter(c => c.counthours && codeTotals[c.code] > 0);
  shownCodes.forEach(c => {
    const dispKey = `display-${state.lang}`;
    const disp = c[dispKey] || c['display-en'] || c.code;
    const row = el('div', {className:'row'});
    row.append(el('span', {className:'lab'}, `${S('of-which')} ${disp}`), el('span', {className:'val'}, fmtHM(codeTotals[c.code] || 0)));
    totals.appendChild(row);
  });

  const grandRow = el('div', {className:'grand'});
  grandRow.append(el('span', {className:'lab'}, S('total-hours')), el('span', {className:'val'}, fmtHM(grandMins)));
  totals.appendChild(grandRow);

  const decRow = el('div', {className:'row'});
  decRow.append(el('span', {className:'lab'}, S('total-hours-decimal')), el('span', {className:'val'}, decimalHours));
  totals.appendChild(decRow);

  const unpMins = codeTotals['UNP'] || 0;
  if (unpMins > 0 && grandMins > 0) {
    const qty = (1 - unpMins / grandMins).toFixed(6);
    const noteTemplate = S('note-unpaid');
    const noteText = noteTemplate
      .replace('{x}', fmtHM(unpMins))
      .replace('{y}', fmtHM(grandMins))
      .replace('{q}', qty);
    const noteDiv = el('div', {className:'note'});
    noteText.split('\n').forEach((line, i) => {
      if (i > 0) noteDiv.appendChild(el('br'));
      noteDiv.appendChild(document.createTextNode(line));
    });
    totals.appendChild(noteDiv);
  }

  card.appendChild(totals);
  return card;
}

// ========== PERIOD / DAY REGENERATION ==========
function regenerateDays() {
  if (!state.periodFrom || !state.periodTo) return;
  const newDays = buildDefaultDays(state.periodFrom, state.periodTo, state.empType);
  for (const ds of Object.keys(newDays)) {
    if (state.days[ds]) newDays[ds] = state.days[ds];
  }
  state.days = newDays;

  const gridWrap = $('#grid-wrap');
  if (!gridWrap) { render(); return; }

  const header = gridWrap.querySelector('.kb-rowhead');
  gridWrap.innerHTML = '';
  if (header) gridWrap.appendChild(header);

  const dates = dateRange(state.periodFrom, state.periodTo);
  dates.forEach(ds => gridWrap.appendChild(renderDayBlock(ds)));
  refreshSummary();
}

// ========== NEW TIMESHEET ==========
async function onNewTimesheet() {
  const confirmed = await showConfirmModal(S('new-confirm'));
  if (!confirmed) return;
  const p = defaultPeriod();
  state.periodFrom = p.from;
  state.periodTo   = p.to;
  state.days    = buildDefaultDays(p.from, p.to, state.empType);
  state.unlocks = {};
  validationResult = null;
  try { localStorage.setItem('ts-state', ''); } catch(e) {}
  render();
}

// ========== PDF ENGINE ==========
function parseHexColor(hex) {
  const h = hex.replace('#','');
  return PDFLib.rgb(parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255);
}

function wrapText(text, font, size, maxW) {
  const words = (text || '').split(/\s+/);
  const lines = [];
  let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if (font.widthOfTextAtSize(test, size) > maxW) { if (cur) lines.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  return lines.length ? lines : [''];
}

function truncate(text, font, size, maxW) {
  if (!text) return '';
  if (font.widthOfTextAtSize(text, size) <= maxW) return text;
  let t = text;
  while (t.length > 1 && font.widthOfTextAtSize(t + '…', size) > maxW) t = t.slice(0, -1);
  return t + '…';
}

async function loadLogo(doc) {
  for (const ext of ['png','jpg']) {
    try {
      const res = await fetch(`assets/logo.${ext}`);
      if (!res.ok) continue;
      const buf = await res.arrayBuffer();
      return ext === 'png' ? await doc.embedPng(buf) : await doc.embedJpg(buf);
    } catch(e) { continue; }
  }
  return null;
}

async function generatePDF() {
  const { PDFDocument, StandardFonts, rgb } = PDFLib;
  const doc = await PDFDocument.create();
  const pageW = CFG['page-size'] === 'letter' ? 612 : 595.28;
  const pageH = CFG['page-size'] === 'letter' ? 792 : 841.89;
  // Slightly wider margins — more breathing room than before
  const M = { top: 36, bottom: 48, left: 28, right: 28 };
  const W = pageW - M.left - M.right;

  const fontBody = await doc.embedFont(StandardFonts.Helvetica);
  const fontBold = await doc.embedFont(StandardFonts.HelveticaBold);

  // Type scale — aligned to design system hierarchy
  const szBody  = 9;   // body text
  const szSm    = 8;   // secondary / descriptions
  const szEye   = 7;   // eyebrow labels (UPPERCASE, tracked)
  const szOrg   = 13;  // org name in header
  const szTitle = 18;  // document title
  const szGrand = 13;  // grand-total figure
  const lh      = 13;  // data row line advance
  const rowPad  = 2;   // text offset above row bottom

  // Color tokens — matched to kBenestad design system
  const accent   = parseHexColor(CFG['accent-colour'] || '#2f6fed');
  const ink      = rgb(0.078, 0.094, 0.118);  // --text      #14181e
  const inkSoft  = rgb(0.227, 0.263, 0.310);  // --text-soft #3a434f
  const muted    = rgb(0.373, 0.412, 0.459);  // --text-muted #5f6975
  const subtle   = rgb(0.604, 0.639, 0.686);  // --text-subtle #9aa3af
  const hairline = rgb(0.890, 0.906, 0.933);  // --border     #e3e7ee
  const divider  = rgb(0.827, 0.851, 0.886);  // --border-strong #d3d9e2
  const white    = rgb(1, 1, 1);

  const now = new Date();
  const printed = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  let logoImage = null;
  if (CFG.logo === true || CFG.logo === 'yes') logoImage = await loadLogo(doc);

  const pages = [];
  let pg, y;

  // ── Helpers ────────────────────────────────────────────────────────────
  function hline(yy, thickness = 0.5, color = hairline) {
    pg.drawLine({start:{x:M.left, y:yy}, end:{x:M.left+W, y:yy}, thickness, color});
  }

  function eyebrow(txt, x, yy) {
    pg.drawText(txt.toUpperCase(), {x, y: yy, size: szEye, font: fontBold, color: muted, characterSpacing: 0.35});
  }

  function hexToRgb(hex) {
    const h = (hex||'').replace('#','');
    if (h.length !== 6) return null;
    return rgb(parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255);
  }

  // Left-border colour stripe + optional muted bg tint — both kept as designed
  function drawRowBackground(rowY, bgHex, borderHex) {
    const rectBottom = rowY - lh + rowPad + 1;
    const rectH = lh;
    const bg  = bgHex     ? hexToRgb(bgHex)     : null;
    const bdr = borderHex ? hexToRgb(borderHex) : null;
    if (bg)  pg.drawRectangle({x: M.left + BORDER_W, y: rectBottom, width: W - BORDER_W, height: rectH, color: bg,  borderWidth: 0});
    if (bdr) pg.drawRectangle({x: M.left,             y: rectBottom, width: BORDER_W,     height: rectH, color: bdr, borderWidth: 0});
  }

  // Column layout — text starts TX, 6 cols
  const BORDER_W = 3;
  const TX = M.left + BORDER_W + 3;
  const COL = [0, W*0.13, W*0.23, W*0.33, W*0.46, W*0.88];

  // ── Continuation page header ───────────────────────────────────────────
  function drawContHeader() {
    pg.drawText(CFG.organization || '', {x: M.left, y, size: szBody, font: fontBold, color: ink});
    const rTxt = `${state.periodFrom} – ${state.periodTo}  ·  ${state.employee || ''}`;
    const rw = fontBody.widthOfTextAtSize(rTxt, szSm);
    pg.drawText(rTxt, {x: M.left + W - rw, y, size: szSm, font: fontBody, color: muted});
    y -= szBody + 5;
    hline(y, 1.5, accent);
    y -= 10;
  }

  function addPage(cont) {
    pg = doc.addPage([pageW, pageH]);
    pages.push(pg);
    y = pageH - M.top;
    if (cont) drawContHeader();
  }

  function needSpace(h) {
    if (y - h < M.bottom) addPage(true);
  }

  // ── Page 1 header ──────────────────────────────────────────────────────
  addPage(false);
  const hdrTopY = y;

  // Left: logo or org name
  if (logoImage) {
    const maxW = (CFG['logo-maxwidth'] || 4) * 28.3465;
    const logoH = 36;
    const scale = Math.min(maxW / logoImage.width, logoH / logoImage.height, 1);
    const lw = logoImage.width * scale, lhh = logoImage.height * scale;
    pg.drawImage(logoImage, {x: M.left, y: hdrTopY - lhh + szBody, width: lw, height: lhh});
  } else if (CFG.organization) {
    pg.drawText(CFG.organization, {x: M.left, y: hdrTopY, size: szOrg, font: fontBold, color: ink});
    const tObj2 = empTypeObj(state.empType);
    const typeLabel = tObj2 ? ((typeof tObj2.display === 'object') ? (tObj2.display[state.lang] || tObj2.display['en']) : tObj2.display) : '';
    const subTxt = typeLabel ? `Timesheet  ·  ${typeLabel}` : 'Timesheet';
    pg.drawText(subTxt, {x: M.left, y: hdrTopY - szOrg - 4, size: szSm, font: fontBody, color: muted});
  }

  // Right: document title (large, accent) + period below
  const titleStr = S('pdf-title');
  const tw = fontBold.widthOfTextAtSize(titleStr, szTitle);
  pg.drawText(titleStr, {x: M.left + W - tw, y: hdrTopY, size: szTitle, font: fontBold, color: accent});
  const periodStr = `${fmtDate(state.periodFrom, state.lang)} – ${fmtDate(state.periodTo, state.lang)}`;
  const prw = fontBody.widthOfTextAtSize(periodStr, szSm);
  pg.drawText(periodStr, {x: M.left + W - prw, y: hdrTopY - szTitle - 4, size: szSm, font: fontBody, color: muted});

  y = hdrTopY - 36 - 10;
  hline(y, 1.5, accent);
  y -= 13;

  // Employee / period / type — eyebrow labels + values
  const c1 = 0, c2 = W * 0.35, c3 = W * 0.65;
  eyebrow(S('pdf-employee'), M.left + c1, y);
  eyebrow(S('pdf-period'),   M.left + c2, y);
  eyebrow(S('pdf-type'),     M.left + c3, y);
  y -= szEye + 5;
  pg.drawText(state.employee || '—', {x: M.left + c1, y, size: szBody, font: fontBold,  color: ink});
  pg.drawText(`${state.periodFrom}  –  ${state.periodTo}`, {x: M.left + c2, y, size: szBody, font: fontBody, color: inkSoft});
  const tObj = empTypeObj(state.empType);
  const typeDisp2 = tObj ? ((typeof tObj.display === 'object') ? (tObj.display[state.lang] || tObj.display['en'] || state.empType) : (tObj.display || state.empType)) : state.empType;
  pg.drawText(typeDisp2, {x: M.left + c3, y, size: szBody, font: fontBody, color: inkSoft});
  y -= szBody + 10;

  // Section separator before table
  hline(y, 0.75, divider);
  y -= 9;

  // Column header eyebrows
  const colHeaders = [S('col-date'), S('col-time-in'), S('col-time-out'), S('col-code'), S('col-description'), S('col-hours')];
  colHeaders.forEach((h, i) => {
    if (i === 5) {
      const hw = fontBold.widthOfTextAtSize(h.toUpperCase(), szEye);
      eyebrow(h, M.left + W - hw, y);
    } else {
      eyebrow(h, TX + COL[i], y);
    }
  });
  y -= szEye + 4;
  hline(y, 1, divider);
  y -= 6;

  // ── Data rows ──────────────────────────────────────────────────────────
  const sortedDates = Object.keys(state.days).sort();

  for (let di = 0; di < sortedDates.length; di++) {
    const ds = sortedDates[di];
    const rows = state.days[ds];
    const totalRowsDay = rows.length;

    if (di > 0) y -= 2;

    for (let ri = 0; ri < rows.length; ri++) {
      const row = rows[ri];
      const isFirst = ri === 0;
      const isLocked = isRowLocked(ds, ri, row);
      needSpace(lh + 3);

      const rowY = y;
      const textColor = isLocked ? subtle : inkSoft;

      // Resolve row colours from config
      const cObjRow = row.code && row.code !== 'WEEKEND' ? codeObj(row.code) : null;
      let bgHex = null, borderHex = null;
      if (row.code === 'WEEKEND' || !row.code) {
        bgHex = '#ebebeb'; borderHex = '#c0c0c0';
      } else if (cObjRow) {
        if (row.code === 'PPT') {
          const isFullDay = totalRowsDay === 1;
          bgHex     = isFullDay ? cObjRow['colour-bg-fullday']     : cObjRow['colour-bg-partialday'];
          borderHex = isFullDay ? cObjRow['colour-border-fullday'] : cObjRow['colour-border-partialday'];
        } else {
          bgHex = cObjRow['colour-bg']; borderHex = cObjRow['colour-border'];
        }
      }
      drawRowBackground(rowY, bgHex, borderHex);

      // Date (first row of day only) — bold date, subtle DOW
      if (isFirst) {
        const dateTxt = fmtDate(ds, state.lang);
        const dowTxt  = fmtDow(ds, state.lang);
        pg.drawText(dateTxt, {x: TX + COL[0], y: rowY, size: szBody, font: isLocked ? fontBody : fontBold, color: isLocked ? subtle : ink});
        const dw = (isLocked ? fontBody : fontBold).widthOfTextAtSize(dateTxt, szBody);
        pg.drawText('  ' + dowTxt, {x: TX + COL[0] + dw, y: rowY, size: szSm, font: fontBody, color: subtle});
      }

      if (row.timeIn)  pg.drawText(row.timeIn,  {x: TX + COL[1], y: rowY, size: szBody, font: fontBody, color: textColor});
      if (row.timeOut) pg.drawText(row.timeOut, {x: TX + COL[2], y: rowY, size: szBody, font: fontBody, color: textColor});

      if (row.code === 'WEEKEND') {
        pg.drawText(state.lang === 'vi' ? 'Cuối tuần' : 'Weekend', {x: TX + COL[3], y: rowY, size: szSm, font: fontBody, color: subtle});
      } else if (row.code) {
        const dispKey = `display-${state.lang}`;
        const codeTxt = cObjRow ? (cObjRow[dispKey] || cObjRow['display-en'] || row.code) : row.code;
        pg.drawText(codeTxt, {x: TX + COL[3], y: rowY, size: szBody, font: fontBody, color: textColor});
      }

      // Description — smaller, muted
      const descMaxW = COL[5] - COL[4] - 4;
      if (row.desc) {
        pg.drawText(truncate(row.desc, fontBody, szSm, descMaxW), {x: TX + COL[4], y: rowY, size: szSm, font: fontBody, color: isLocked ? subtle : muted});
      }

      // Hours — right-aligned, bold for active rows
      const mins = calcRowMins(row);
      if (mins != null && mins > 0) {
        const hStr = fmtHM(mins);
        const hw = fontBold.widthOfTextAtSize(hStr, szBody);
        pg.drawText(hStr, {x: M.left + W - hw, y: rowY, size: szBody, font: fontBold, color: isLocked ? subtle : ink});
      }

      y -= lh;
    }
  }

  // ── Summary + signatures ───────────────────────────────────────────────
  const {codeTotals, grandMins} = computeTotals();
  const decHours = (grandMins / 60).toFixed(2);
  const shownCodes = (CFG.codes || []).filter(c => c.counthours && codeTotals[c.code] > 0);

  // Estimate space needed
  const sigBoxH = 40;
  const sigBlockH = needsSignature() ? szEye + 6 + sigBoxH + lh + 6 : 0;
  const sumBlockH = (shownCodes.length + 2) * lh + szGrand + 12;
  needSpace(14 + Math.max(sigBlockH, sumBlockH) + 16);

  y -= 10;
  hline(y, 1.5, accent);
  y -= 14;

  const blockTopY = y;

  // ── RIGHT: totals panel ────────────────────────────────────────────────
  const sumColX   = M.left + W * 0.58;
  const sumRight  = M.left + W;
  let sy = blockTopY;

  // Code breakdowns
  shownCodes.forEach(c => {
    const dispKey = `display-${state.lang}`;
    const disp = c[dispKey] || c['display-en'] || c.code;
    const valTxt = fmtHM(codeTotals[c.code] || 0);
    const vw = fontBody.widthOfTextAtSize(valTxt, szSm);
    pg.drawText(`${S('of-which')}  ${disp}`, {x: sumColX, y: sy, size: szSm, font: fontBody, color: muted});
    pg.drawText(valTxt, {x: sumRight - vw, y: sy, size: szSm, font: fontBody, color: inkSoft});
    sy -= lh;
  });

  // Decimal hours
  const decValW = fontBody.widthOfTextAtSize(decHours, szSm);
  pg.drawText(S('total-hours-decimal'), {x: sumColX, y: sy, size: szSm, font: fontBody, color: muted});
  pg.drawText(decHours, {x: sumRight - decValW, y: sy, size: szSm, font: fontBody, color: inkSoft});
  sy -= lh + 3;

  // Divider above grand total
  pg.drawLine({start:{x: sumColX, y: sy}, end:{x: sumRight, y: sy}, thickness: 0.75, color: divider});
  sy -= 6;

  // Grand total — eyebrow label + large accent value
  eyebrow(S('total-hours'), sumColX, sy);
  const grandTxt = fmtHM(grandMins);
  const gw = fontBold.widthOfTextAtSize(grandTxt, szGrand);
  pg.drawText(grandTxt, {x: sumRight - gw, y: sy - (szGrand - szEye), size: szGrand, font: fontBold, color: accent});
  sy -= szGrand + 6;

  const summaryBottomY = sy;

  // ── LEFT: signature blocks ─────────────────────────────────────────────
  if (needsSignature()) {
    const sigColW = W * 0.52;
    const sigBoxW = (sigColW - 12) / 2;
    let sigY = blockTopY;

    // Employee signature
    eyebrow(S('signature-employee'), M.left, sigY);
    sigY -= szEye + 5;
    // Draw bordered box (hairline --border-strong)
    pg.drawRectangle({x: M.left, y: sigY - sigBoxH, width: sigBoxW, height: sigBoxH, borderWidth: 0.75, borderColor: divider, color: white});
    if (signatureDataUrl) {
      const b64 = signatureDataUrl.split(',')[1];
      const sigBytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const sigImg = await doc.embedPng(sigBytes);
      const scale = Math.min((sigBoxW - 6) / sigImg.width, (sigBoxH - 6) / sigImg.height, 1);
      const sw = sigImg.width * scale, sh = sigImg.height * scale;
      pg.drawImage(sigImg, {x: M.left + (sigBoxW - sw) / 2, y: sigY - sigBoxH + (sigBoxH - sh) / 2, width: sw, height: sh});
    }
    sigY -= sigBoxH + 5;
    pg.drawText(`${S('signature-date')}: ${printed}`, {x: M.left, y: sigY, size: szSm, font: fontBody, color: muted});

    // Authorised signature
    const authX = M.left + sigBoxW + 12;
    let authY = blockTopY;
    eyebrow(S('signature-authorised'), authX, authY);
    authY -= szEye + 5;
    pg.drawRectangle({x: authX, y: authY - sigBoxH, width: sigBoxW, height: sigBoxH, borderWidth: 0.75, borderColor: divider, color: white});
    authY -= sigBoxH + 5;
    const dateLabel = `${S('signature-date')}:`;
    const dlw = fontBody.widthOfTextAtSize(dateLabel + ' ', szSm);
    pg.drawText(dateLabel, {x: authX, y: authY, size: szSm, font: fontBody, color: muted});
    pg.drawLine({start:{x: authX + dlw, y: authY - 1}, end:{x: authX + sigBoxW, y: authY - 1}, thickness: 0.5, color: divider});

    y = Math.min(summaryBottomY, authY - 12);
  } else {
    y = summaryBottomY - 6;
  }

  // ── Unpaid leave note ──────────────────────────────────────────────────
  const unpMins = codeTotals['UNP'] || 0;
  if (unpMins > 0 && grandMins > 0) {
    y -= 6;
    hline(y, 0.5, hairline);
    y -= 10;
    const qty = (1 - unpMins / grandMins).toFixed(6);
    const noteText = S('note-unpaid').replace('{x}', fmtHM(unpMins)).replace('{y}', fmtHM(grandMins)).replace('{q}', qty);
    noteText.split('\n').forEach(line => {
      wrapText(line, fontBody, szSm, W).forEach(wl => {
        pg.drawText(wl, {x: M.left, y, size: szSm, font: fontBody, color: muted});
        y -= lh;
      });
    });
  }

  // ── Footer (every page) ────────────────────────────────────────────────
  const totalPages = pages.length;
  pages.forEach((p, i) => {
    const fy = M.bottom - 10;
    p.drawLine({start:{x:M.left, y:fy+10}, end:{x:M.left+W, y:fy+10}, thickness: 0.5, color: hairline});
    const leftStr = [CFG.footer, state.employee].filter(Boolean).join('  ·  ');
    if (leftStr) p.drawText(leftStr, {x: M.left, y: fy, size: szEye, font: fontBody, color: subtle, characterSpacing: 0.2});
    const rightStr = `${i+1} / ${totalPages}  ·  ${printed}`;
    const rw = fontBody.widthOfTextAtSize(rightStr, szEye);
    p.drawText(rightStr, {x: M.left + W - rw, y: fy, size: szEye, font: fontBody, color: subtle, characterSpacing: 0.2});
  });

  const pdfBytes = await doc.save();
  const blob = new Blob([pdfBytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const emp = (state.employee || 'employee').replace(/\s+/g,'_');
  a.download = `timesheet_${emp}_${state.periodFrom}_${state.periodTo}.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}

// ========== GENERATE HANDLER ==========
async function onGenerate() {
  validationResult = runValidation();
  const valBox = $('#val-box');
  renderValBox(valBox);
  const genBtn = $('#gen-btn');
  if (validationResult.errors.length) {
    updateGenBtn(genBtn);
    valBox.scrollIntoView({behavior:'smooth'});
    return;
  }
  genBtn.disabled = true;
  const origHTML = genBtn.innerHTML;
  genBtn.textContent = S('generating');
  try {
    await generatePDF();
  } catch(e) {
    alert('Error generating PDF: ' + e.message);
    console.error(e);
  }
  genBtn.disabled = false;
  genBtn.innerHTML = origHTML;
}

// ========== INIT ==========
async function init() {
  try {
    await loadConfig();
    loadSignature();

    const savedScale = localStorage.getItem('ts-fontscale');
    if (savedScale) document.documentElement.style.setProperty('--font-scale', savedScale);

    const savedLang = localStorage.getItem('timesheet-lang');
    const savedEmp  = localStorage.getItem('timesheet-employee');
    const savedType = localStorage.getItem('timesheet-type');
    if (savedLang) state.lang = savedLang;
    if (savedEmp)  state.employee = savedEmp;
    const validTypes = (CFG['employee-types'] || []).map(t => t.code);
    if (savedType && validTypes.includes(savedType)) state.empType = savedType;
    else if (validTypes.length) state.empType = validTypes[0];

    const p = defaultPeriod();
    state.periodFrom = p.from;
    state.periodTo   = p.to;

    const restored = loadSavedState();
    if (!restored || !state.periodFrom || Object.keys(state.days).length === 0) {
      state.days = buildDefaultDays(state.periodFrom, state.periodTo, state.empType);
    }

    render();

    document.addEventListener('input', scheduleAutoSave);
    document.addEventListener('change', scheduleAutoSave);
    document.getElementById('footer-about-btn').addEventListener('click', showAboutModal);
  } catch(e) {
    $('#app').innerHTML = `<div class="kb-wrap"><div class="kb-note kb-note--error"><span>⚠</span><div><b>Failed to load</b><br>${e.message}</div></div></div>`;
    console.error(e);
  }
}

init();
})();
</script>
