on: [push]
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:timesheet
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: yesolutions/mirror-action@master
        with:
          REMOTE: 'https://codeberg.org/timesheet/timesheet.git'
          GIT_USERNAME: kbenestad
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
