# =============================================================================
# Timesheet App — Configuration
# =============================================================================

organization: "Center for Asylum Protection"
logo: yes
logo-maxwidth: 4
page-size: A4
font-body: Helvetica
font-heading: Helvetica
font-size: 10
accent-colour: "#1a3a5c"
footer: "Confidential"
muted-background: yes
default-work-code: REG

employee-types:
  - code: hourly
    display: "Hourly"
    prefilled: non-working

  - code: monthly
    display: "Monthly"
    prefilled: working

  - code: freelance
    display: "Freelance"
    prefilled: non-working

workdays: [Mon, Tue, Wed, Thu, Fri]
workhours-from: "09:00"
workhours-to: "17:00"

holidays:
  - date: "2025-01-01"
    display-en: "New Year's Day"
    display-vi: "Tết Dương lịch"

codes:
  - code: NON
    display-en: "Non-working day"
    display-vi: "Ngày không làm việc"
    counthours: no
    lockstate: locked
    employee-types: [hourly, freelance]
    colour-border: "#393939"
    colour-bg: "#d7d7d7"

  - code: REG
    display-en: "Regular"
    display-vi: "Thường"
    counthours: yes
    lockstate: unlocked
    employee-types: [monthly, hourly, freelance]
    colour-border: "#0078d7"
    colour-bg: "#cce4f7"
    hint-en: "Please describe your activities"
    hint-vi: "Vui lòng mô tả hoạt động của bạn"

  - code: PPT
    display-en: "PPT"
    display-vi: "Nghỉ phép"
    counthours: yes
    lockstate: locked
    employee-types: [monthly, hourly]
    colour-border-fullday: "#ed616f"
    colour-bg-fullday: "#ffd9d9"
    colour-border-partialday: "#ffb900"
    colour-bg-partialday: "#fff1cc"

  - code: OTH
    display-en: "Other paid leave"
    display-vi: "Nghỉ có lương khác"
    counthours: yes
    lockstate: unlocked
    employee-types: [monthly, hourly]
    colour-border: "#a4252c"
    colour-bg: "#edd4d5"
    hint-en: "Please enter type of leave"
    hint-vi: "Vui lòng nhập loại nghỉ phép"

  - code: UNP
    display-en: "Unpaid leave"
    display-vi: "Nghỉ không lương"
    counthours: yes
    lockstate: locked
    employee-types: [monthly]
    colour-border: "#393939"
    colour-bg: "#d7d7d7"

  - code: HOL
    display-en: "Holiday"
    display-vi: "Ngày lễ"
    counthours: yes
    lockstate: locked
    employee-types: [monthly, hourly, freelance]
    colour-border: "#8cbd18"
    colour-bg: "#e8f2d1"

languages:
  - code: en
    display: "English"
  - code: vi
    display: "Tiếng Việt"

